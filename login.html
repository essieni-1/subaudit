<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubAudit — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --lime: #C8FF00;
      --bg: #09090F;
      --bg2: #111118;
      --bg3: #16161F;
      --border: #1E1E2A;
      --text: #FFFFFF;
      --muted: #666680;
      --red: #FF4D4D;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.12;
    }
    .blob1 { width: 500px; height: 500px; background: var(--lime); top: -150px; left: -150px; animation: float 8s ease-in-out infinite; }
    .blob2 { width: 400px; height: 400px; background: #4040FF; bottom: -150px; right: -100px; animation: float 10s ease-in-out infinite reverse; }
    .grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: 0.3;
      mask-image: radial-gradient(ellipse at 50% 50%, black 0%, transparent 70%);
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .logo {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 900;
      color: var(--text); text-decoration: none;
      display: block; margin-bottom: 32px;
    }
    .logo span { color: var(--lime); }

    .tabs {
      display: flex; gap: 0;
      background: var(--bg3); border-radius: 12px;
      padding: 4px; margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 9px;
      border: none; background: none;
      color: var(--muted); font-size: 14px; font-weight: 600;
      font-family: var(--font-display);
      border-radius: 9px; cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 2px 8px #00000044;
    }

    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 7px;
    }
    input {
      width: 100%; padding: 13px 16px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 15px; font-family: var(--font-body);
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--lime); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--lime); color: #09090F;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800;
      font-family: var(--font-display);
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-google {
      width: 100%; padding: 13px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 15px; font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: var(--muted); background: #1a1a24; }

    .error-msg {
      background: #FF4D4D18; border: 1px solid #FF4D4D30;
      border-radius: 10px; padding: 12px 14px;
      color: var(--red); font-size: 13px; margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: #C8FF0018; border: 1px solid #C8FF0030;
      border-radius: 10px; padding: 12px 14px;
      color: var(--lime); font-size: 13px; margin-bottom: 16px;
      display: none;
    }
    .footer-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .footer-link a { color: var(--lime); text-decoration: none; }

    /* Google icon SVG */
    .g-icon { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="grid"></div>
  </div>

  <div class="page">
    <div class="card">
      <a href="index.html" class="logo">sub<span>audit</span></a>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign in</button>
        <button class="tab" onclick="switchTab('signup')">Create account</button>
      </div>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn" onclick="handleLogin()">
          Sign in →
        </button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="handleGoogle()">
          <svg class="g-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signup-form" style="display:none">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="signup-name" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min. 8 characters" />
        </div>
        <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
          Create account →
        </button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="handleGoogle()">
          <svg class="g-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <div class="footer-link">
        <a href="index.html">← Back to home</a>
      </div>
    </div>
  </div>

  <script>
    // =====================
    // SUPABASE INIT
    // =====================
    const SUPABASE_URL = "https://qlpeoqztfzscksaehyoq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_1GivVF7YUdX0DqyUXStC5A_LrFHbsDs";
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "dashboard.html";
    });

    // =====================
    // TAB SWITCHING
    // =====================
    function switchTab(tab) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      event.target.classList.add("active");
      document.getElementById("login-form").style.display = tab === "login" ? "block" : "none";
      document.getElementById("signup-form").style.display = tab === "signup" ? "block" : "none";
      clearMessages();
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg; el.style.display = "block";
      document.getElementById("success-msg").style.display = "none";
    }
    function showSuccess(msg) {
      const el = document.getElementById("success-msg");
      el.textContent = msg; el.style.display = "block";
      document.getElementById("error-msg").style.display = "none";
    }
    function clearMessages() {
      document.getElementById("error-msg").style.display = "none";
      document.getElementById("success-msg").style.display = "none";
    }

    // =====================
    // LOGIN
    // =====================
    async function handleLogin() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const btn = document.getElementById("login-btn");

      if (!email || !password) return showError("Please fill in all fields.");

      btn.disabled = true; btn.textContent = "Signing in...";

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        btn.disabled = false; btn.textContent = "Sign in →";
      } else {
        window.location.href = "dashboard.html";
      }
    }

    // =====================
    // SIGNUP
    // =====================
    async function handleSignup() {
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const btn = document.getElementById("signup-btn");

      if (!name || !email || !password) return showError("Please fill in all fields.");
      if (password.length < 8) return showError("Password must be at least 8 characters.");

      btn.disabled = true; btn.textContent = "Creating account...";

      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });

      if (error) {
        showError(error.message);
        btn.disabled = false; btn.textContent = "Create account →";
      } else {
        showSuccess("✅ Check your email to confirm your account, then sign in!");
        btn.disabled = false; btn.textContent = "Create account →";
      }
    }

    // =====================
    // GOOGLE LOGIN
    // =====================
    async function handleGoogle() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/dashboard.html"
        }
      });
      if (error) showError(error.message);
    }

    // Enter key support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const loginVisible = document.getElementById("login-form").style.display !== "none";
        if (loginVisible) handleLogin();
        else handleSignup();
      }
    });
  </script>
</body>
</html>
